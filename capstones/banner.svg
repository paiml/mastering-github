<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <!-- Background -->
  <rect width="1200" height="400" fill="#ffffff"/>

  <!-- Zone dividers -->
  <line x1="400" y1="0" x2="400" y2="400" stroke="#a5d6ff" stroke-width="1.5"/>
  <line x1="800" y1="0" x2="800" y2="400" stroke="#a5d6ff" stroke-width="1.5"/>

  <!-- Atmospheric blobs -->
  <circle cx="200" cy="200" r="170" fill="#4a9eff" opacity="0.04"/>
  <circle cx="600" cy="200" r="175" fill="#9f8fef" opacity="0.05"/>
  <circle cx="1000" cy="200" r="170" fill="#ffab00" opacity="0.04"/>

  <!-- Zone 1: Rocket (Launch / Ship It) centered at x=200, y=185 -->
  <g id="rocket-launch" transform="translate(200,185)">
    <!-- Rocket body -->
    <path d="M0-55 C-14-55 -18-30 -18 10 L18 10 C18-30 14-55 0-55 Z"
          fill="#4a9eff" fill-opacity="0.12" stroke="#0056d2" stroke-width="4" stroke-linejoin="round"/>
    <!-- Nose cone highlight -->
    <path d="M0-55 C-8-55 -12-38 -14-20" fill="none" stroke="#4a9eff" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Window -->
    <circle cx="0" cy="-18" r="8" fill="#ffffff" stroke="#0056d2" stroke-width="3"/>
    <circle cx="0" cy="-18" r="4" fill="#4a9eff" fill-opacity="0.3"/>
    <!-- Fins -->
    <path d="M-18 10 L-30 30 L-18 22 Z" fill="#0056d2" fill-opacity="0.2" stroke="#0056d2" stroke-width="3" stroke-linejoin="round"/>
    <path d="M18 10 L30 30 L18 22 Z" fill="#0056d2" fill-opacity="0.2" stroke="#0056d2" stroke-width="3" stroke-linejoin="round"/>
    <!-- Exhaust flames -->
    <path d="M-10 10 L-6 35 L0 22 L6 35 L10 10" fill="none" stroke="#ffab00" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-5 10 L-2 45 L0 30 L2 45 L5 10" fill="none" stroke="#ff9d1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Zone 2: Puzzle Pieces (Integration / Synthesis) centered at x=600, y=185 -->
  <g id="puzzle-synthesis" transform="translate(600,185)">
    <!-- Top-left piece -->
    <path d="M-35-35 L-5-35 C-5-45 5-45 5-35 L35-35 L35-5 C45-5 45 5 35 5 L35 35 L-35 35 L-35 5 C-45 5 -45-5 -35-5 Z"
          fill="#9f8fef" fill-opacity="0.10" stroke="#9f8fef" stroke-width="4" stroke-linejoin="round"/>
    <!-- Inner detail — connecting nubs -->
    <circle cx="0" cy="-35" r="5" fill="none" stroke="#b8acff" stroke-width="2.5"/>
    <circle cx="35" cy="0" r="5" fill="none" stroke="#b8acff" stroke-width="2.5"/>
    <circle cx="-35" cy="0" r="5" fill="none" stroke="#b8acff" stroke-width="2.5"/>
    <!-- Center checkmark -->
    <polyline points="-12,2 -4,10 14,-8" fill="none" stroke="#9f8fef" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Zone 3: Trophy (Achievement) centered at x=1000, y=185 -->
  <g id="trophy-achievement" transform="translate(1000,185)">
    <!-- Cup body -->
    <path d="M-22-40 L-22-5 C-22 20 22 20 22-5 L22-40 Z"
          fill="#ffab00" fill-opacity="0.12" stroke="#f38b00" stroke-width="4" stroke-linejoin="round"/>
    <!-- Left handle -->
    <path d="M-22-30 C-40-30 -40 0 -22 0" fill="none" stroke="#f38b00" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Right handle -->
    <path d="M22-30 C40-30 40 0 22 0" fill="none" stroke="#f38b00" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Stem -->
    <line x1="0" y1="20" x2="0" y2="35" stroke="#f38b00" stroke-width="4" stroke-linecap="round"/>
    <!-- Base -->
    <rect x="-18" y="35" width="36" height="8" rx="3" fill="#ffab00" fill-opacity="0.2" stroke="#f38b00" stroke-width="3"/>
    <!-- Star on cup -->
    <polygon points="0,-28 4,-20 12,-20 6,-14 8,-6 0,-10 -8,-6 -6,-14 -12,-20 -4,-20"
             fill="#ffab00" fill-opacity="0.4" stroke="#f38b00" stroke-width="2"/>
  </g>

  <!-- GRID PROTOCOL MANIFEST
  template: BANNER (Template F)
  canvas: 1200x400
  zones: [0..400, 400..800, 800..1200]
  icon_centers: [200, 600, 1000]
  text_elements: 0
  palette_colors: [#ffffff, #4a9eff, #0056d2, #9f8fef, #b8acff, #ffab00, #ff9d1a, #f38b00, #a5d6ff]
  bounds_check: all elements within 0,0 → 1200,400
  -->
</svg>
