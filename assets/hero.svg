<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="500" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="58" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="44" font-weight="800" fill="#ffffff" letter-spacing="0.5">Mastering GitHub</text>
  <text x="600" y="90" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="18" font-weight="600" fill="#b0bac5" letter-spacing="3">FROM FIRST COMMIT TO PRODUCTION · 9 COURSES</text>

  <!-- ═══ ROW 1: Courses 1–5 (y=195) ═══ -->

  <line x1="130" y1="195" x2="1070" y2="195" stroke="#21262d" stroke-width="2.5"/>

  <!-- Course 1 -->
  <g transform="translate(130,195)">
    <circle r="44" fill="#4a9eff" fill-opacity="0.15" stroke="#4a9eff" stroke-width="3"/>
    <line x1="-12" y1="-14" x2="0" y2="0" stroke="#4a9eff" stroke-width="4" stroke-linecap="round"/>
    <line x1="12" y1="-14" x2="0" y2="0" stroke="#4a9eff" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="0" y2="16" stroke="#4a9eff" stroke-width="4" stroke-linecap="round"/>
    <circle cx="-12" cy="-14" r="4" fill="#4a9eff" fill-opacity="0.5"/>
    <circle cx="12" cy="-14" r="4" fill="#4a9eff" fill-opacity="0.5"/>
    <text y="68" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e6edf3">Pull Requests</text>
    <text y="-54" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="800" fill="#4a9eff">1</text>
  </g>

  <!-- Course 2 -->
  <g transform="translate(365,195)">
    <circle r="44" fill="#4a9eff" fill-opacity="0.15" stroke="#4a9eff" stroke-width="3"/>
    <path d="M0-18 L14-10 L14 4 Q14 16 0 20 Q-14 16 -14 4 L-14-10 Z" fill="#4a9eff" fill-opacity="0.20" stroke="#4a9eff" stroke-width="3" stroke-linejoin="round"/>
    <line x1="0" y1="-7" x2="0" y2="5" stroke="#4a9eff" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="9" r="2.5" fill="#4a9eff"/>
    <text y="68" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e6edf3">Security</text>
    <text y="-54" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="800" fill="#4a9eff">2</text>
  </g>

  <!-- Course 3 -->
  <g transform="translate(600,195)">
    <circle r="44" fill="#9f8fef" fill-opacity="0.15" stroke="#9f8fef" stroke-width="3"/>
    <path d="M-14 6 Q-14-8 -4-8 Q0-18 12-14 Q22-10 18 0 Q24 8 16 8 L-12 8 Q-18 8 -14 6 Z" fill="#9f8fef" fill-opacity="0.20" stroke="#9f8fef" stroke-width="3"/>
    <text y="68" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e6edf3">Actions</text>
    <text y="-54" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="800" fill="#9f8fef">3</text>
  </g>

