  <g transform="translate(835,195)">
    <circle r="44" fill="#9f8fef" fill-opacity="0.15" stroke="#9f8fef" stroke-width="3"/>
    <rect x="-14" y="-16" width="28" height="32" rx="3" fill="#9f8fef" fill-opacity="0.20" stroke="#9f8fef" stroke-width="3"/>
    <line x1="-7" y1="-8" x2="-7" y2="-2" stroke="#9f8fef" stroke-width="2.5"/>
    <line x1="0" y1="-8" x2="0" y2="-2" stroke="#9f8fef" stroke-width="2.5"/>
    <line x1="7" y1="-8" x2="7" y2="-2" stroke="#9f8fef" stroke-width="2.5"/>
    <line x1="-7" y1="4" x2="-7" y2="10" stroke="#9f8fef" stroke-width="2.5"/>
    <line x1="0" y1="4" x2="0" y2="10" stroke="#9f8fef" stroke-width="2.5"/>
    <line x1="7" y1="4" x2="7" y2="10" stroke="#9f8fef" stroke-width="2.5"/>
    <text y="68" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e6edf3">Enterprise</text>
    <text y="-54" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="800" fill="#9f8fef">4</text>
