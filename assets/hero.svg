  <!-- Course 6 -->
  <g transform="translate(185,360)">
    <circle r="44" fill="#00b8d9" fill-opacity="0.15" stroke="#00b8d9" stroke-width="3"/>
    <rect x="-16" y="-14" width="32" height="20" rx="5" fill="#00b8d9" fill-opacity="0.20" stroke="#00b8d9" stroke-width="3"/>
    <polygon points="-6,6 -11,16 2,6" fill="#00b8d9" fill-opacity="0.20" stroke="#00b8d9" stroke-width="2.5"/>
    <text x="0" y="0" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#00b8d9">&gt;_</text>
    <text y="68" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e6edf3">Prompting</text>
    <text y="-54" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="800" fill="#00b8d9">6</text>
