    <polyline points="-7,1 -1,8 9,-7" fill="none" stroke="#36b37e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text y="68" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e6edf3">Testing</text>
    <text y="-54" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="800" fill="#36b37e">7</text>
  </g>

