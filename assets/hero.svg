  <!-- Course 5 -->
  <g transform="translate(1070,195)">
    <circle r="44" fill="#00b8d9" fill-opacity="0.15" stroke="#00b8d9" stroke-width="3"/>
    <circle cx="-8" cy="-8" r="6" fill="#00b8d9" fill-opacity="0.30" stroke="#00b8d9" stroke-width="2.5"/>
    <circle cx="8" cy="-8" r="6" fill="#00b8d9" fill-opacity="0.30" stroke="#00b8d9" stroke-width="2.5"/>
    <circle cx="0" cy="8" r="6" fill="#00b8d9" fill-opacity="0.30" stroke="#00b8d9" stroke-width="2.5"/>
    <line x1="-4" y1="-5" x2="4" y2="-5" stroke="#00b8d9" stroke-width="2.5"/>
    <line x1="-6" y1="-3" x2="-3" y2="4" stroke="#00b8d9" stroke-width="2.5"/>
    <line x1="6" y1="-3" x2="3" y2="4" stroke="#00b8d9" stroke-width="2.5"/>
    <text y="68" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e6edf3">AI Models</text>
    <text y="-54" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="800" fill="#00b8d9">5</text>
  </g>

  <!-- Row connector -->
  <path d="M1070,239 L1070,280 Q1070,290 1060,290 L140,290 Q130,290 130,300 L130,360" fill="none" stroke="#21262d" stroke-width="2.5"/>

  <!-- ═══ ROW 2: Courses 6–9 (y=360) ═══ -->

