  <g transform="translate(738,360)">
    <circle r="44" fill="#ffab00" fill-opacity="0.15" stroke="#ffab00" stroke-width="3"/>
    <line x1="0" y1="-16" x2="0" y2="12" stroke="#ffab00" stroke-width="3" stroke-linecap="round"/>
    <line x1="-16" y1="-8" x2="16" y2="-8" stroke="#ffab00" stroke-width="3" stroke-linecap="round"/>
    <path d="M-16-8 L-20 6 L-12 6 Z" fill="#ffab00" fill-opacity="0.30" stroke="#ffab00" stroke-width="2.5"/>
    <path d="M16-8 L12 6 L20 6 Z" fill="#ffab00" fill-opacity="0.30" stroke="#ffab00" stroke-width="2.5"/>
    <line x1="-6" y1="12" x2="6" y2="12" stroke="#ffab00" stroke-width="3" stroke-linecap="round"/>
    <text y="68" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e6edf3">Governance</text>
    <text y="-54" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="800" fill="#ffab00">8</text>
  </g>

  <!-- Course 9 -->
  <g transform="translate(1015,360)">
    <circle r="44" fill="#ffab00" fill-opacity="0.15" stroke="#ffab00" stroke-width="3"/>
    <path d="M0-18 Q10-14 10 0 L4 10 L-4 10 L-10 0 Q-10-14 0-18 Z" fill="#ffab00" fill-opacity="0.30" stroke="#ffab00" stroke-width="3"/>
    <circle cx="0" cy="-6" r="3.5" fill="#ffab00" fill-opacity="0.6"/>
    <line x1="-5" y1="10" x2="-7" y2="18" stroke="#ff5630" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="10" x2="0" y2="19" stroke="#ff5630" stroke-width="3" stroke-linecap="round"/>
    <line x1="5" y1="10" x2="7" y2="18" stroke="#ff5630" stroke-width="3" stroke-linecap="round"/>
    <text y="68" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e6edf3">Capstone</text>
    <text y="-54" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="800" fill="#ffab00">9</text>
  </g>

  <!-- Footer -->
  <text x="600" y="478" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" font-weight="500" fill="#6e7681">Pragmatic AI Labs · Coursera</text>
</svg>
